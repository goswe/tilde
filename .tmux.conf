unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

# allow tmux to access system clipboard
set-option -g set-clipboard on

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

set -gw mode-keys vi

set -g default-terminal "screen-256color"
set-option -g default-terminal "screen-256color"
set-option -a terminal-features "xterm-256color:RGB"

set-option -g set-clipboard external

# dracula theme for tmux
set -g @dracula-military-time true
set -g @dracula-fixed-location "Seattle"
set -g @dracula-plugins "ram-usage weather time"

#set -g @plugin 'dracula/tmux'
# ------------------------
# Optional: TPM Plugins
# ------------------------
#set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm

